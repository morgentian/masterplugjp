<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Masterplug Brand Store</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <!-- HERO -->

    <section class="hero">

        <img src="images/P1.jpg"
             alt="Masterplug Hero">

    </section>


    <!-- STORE HEADER -->

    <section class="store-header">

        <div class="store-header-inner">

            <div class="store-left">

                <img class="store-logo"
                     src="images/logo.png"
                     alt="Masterplug">

                <div class="store-brand">

                    <div class="brand-title">

                        マストプラグ（Masterplug）

                    </div>

                    <div class="brand-actions">

                        <button class="follow-btn">

                            フォローする

                        </button>

                        <button class="share-btn">

                            ↗

                        </button>

                    </div>

                </div>

            </div>


            <div class="store-search">

                <input
                    type="text"
                    placeholder="マストプラグ（Masterplug）">

            </div>

        </div>


        <div class="store-menu">

            <a class="active"
               href="#home">

                ホーム

            </a>

            <a href="#cordreel">

                コードリール

            </a>

            <a href="#waterproof">

                防水ケース

            </a>

            <a href="#usb">

                充電器

            </a>

        </div>

    </section>


    <!-- CONTENT -->

    <section id="home"
             class="banner">

        <img src="images/P2.jpg"
             alt="P2">

    </section>


    <section id="cordreel"
             class="banner">

        <img src="images/P3.jpg"
             alt="P3">

    </section>


    <section id="waterproof"
             class="banner">

        <img src="images/P4.jpg"
             alt="P4">

    </section>


    <section id="usb"
             class="banner">

        <img src="images/P5.jpg"
             alt="P5">

    </section>


    <section class="banner">

        <img src="images/P6.jpg"
             alt="P6">

    </section>

</body>

</html>
